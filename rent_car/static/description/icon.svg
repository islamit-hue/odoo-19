<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="15" fill="#875A7B"/>
  <g fill="white">
    <!-- Car body -->
    <rect x="15" y="45" width="70" height="25" rx="5"/>
    <!-- Car roof -->
    <path d="M30 45 L40 28 L60 28 L70 45 Z"/>
    <!-- Windows -->
    <rect x="42" y="31" width="16" height="11" rx="2" fill="#875A7B"/>
    <!-- Wheels -->
    <circle cx="30" cy="72" r="10" fill="#875A7B" stroke="white" stroke-width="3"/>
    <circle cx="70" cy="72" r="10" fill="#875A7B" stroke="white" stroke-width="3"/>
    <!-- Headlights -->
    <rect x="80" y="52" width="6" height="5" rx="2" fill="#FFD700"/>
    <rect x="14" y="52" width="6" height="5" rx="2" fill="#FFD700"/>
  </g>
</svg>